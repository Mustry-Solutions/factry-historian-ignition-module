name: Build
run-name: Build

on:
  workflow_call:
    secrets:
      SIGNING_KEYSTORE_BASE64:
        required: true
      SIGNING_CERT_FILE_BASE64:
        required: true
      SIGNING_KEYSTORE_PASSWORD:
        required: true
      SIGNING_CERT_ALIAS:
        required: true
      SIGNING_CERT_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode signing certificates
        run: |
          mkdir -p certificates
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > certificates/keystore.jks
          echo "${{ secrets.SIGNING_CERT_FILE_BASE64 }}" | base64 -d > certificates/cert.p7b

      - name: Build signed Ignition module
        run: |
          ./gradlew clean build \
            -Pignition.signing.keystoreFile=certificates/keystore.jks \
            -Pignition.signing.keystorePassword=${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            -Pignition.signing.certAlias=${{ secrets.SIGNING_CERT_ALIAS }} \
            -Pignition.signing.certFile=certificates/cert.p7b \
            -Pignition.signing.certPassword=${{ secrets.SIGNING_CERT_PASSWORD }}

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ignition-module
          path: build/Factry-Historian.modl
          retention-days: 7
