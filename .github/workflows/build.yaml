name: Build
run-name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Ignition module
        run: ./gradlew clean build -PskipSigning=true

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ignition-module
          path: build/Factry-Historian.unsigned.modl
          retention-days: 7
