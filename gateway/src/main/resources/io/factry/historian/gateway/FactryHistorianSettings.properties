# Field labels and descriptions for Factry Historian Settings
# These are displayed in the Gateway configuration UI

collectorUUID.Name=Collector ID
collectorUUID.Description=ID of the collector registered in Factry Historian

token.Name=Token
token.Description=Bearer token for Factry Historian authentication

grpcHost.Name=Host
grpcHost.Description=Hostname of the Factry Historian server

grpcPort.Name=Port
grpcPort.Description=gRPC port of the Factry Historian server

batchSize.Name=Batch Size
batchSize.Description=Number of historical data points to collect before sending

batchIntervalMs.Name=Batch Interval
batchIntervalMs.Description=Time interval in milliseconds between batch sends

debugLogging.Name=Debug Logging
debugLogging.Description=Enable detailed debug logging
