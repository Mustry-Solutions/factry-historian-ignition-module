# Field labels and descriptions for Factry Historian Settings
# These are displayed in the Gateway configuration UI

url.Name=Proxy URL
url.Description=URL of the proxy REST API endpoint (e.g., http://localhost:8111)

timeoutMs.Name=Request Timeout
timeoutMs.Description=Timeout for HTTP requests in milliseconds

batchSize.Name=Batch Size
batchSize.Description=Number of historical data points to collect before sending to the proxy

batchIntervalMs.Name=Batch Interval
batchIntervalMs.Description=Time interval in milliseconds between batch sends

debugLogging.Name=Debug Logging
debugLogging.Description=Enable detailed debug logging for HTTP requests and responses
