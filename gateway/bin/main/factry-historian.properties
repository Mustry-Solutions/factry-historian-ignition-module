# Factry Historian Module - operational settings
# These values are bundled in the module and not exposed in the Ignition UI.

# gRPC write deadline in seconds (createPoints timeout)
grpc.write.deadline.seconds=3

# Connection status cache duration in milliseconds
# Controls how often the gateway polls the gRPC connection for status
status.cache.ms=30000

# Measurement cache refresh interval in seconds
# Periodically syncs the local measurement cache with Factry to detect
# deleted measurements and allow re-creation on the next store
measurement.cache.refresh.seconds=30
