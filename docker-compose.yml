services:
  ignition:
    image: inductiveautomation/ignition:8.3.3
    container_name: ignition-dev
    ports:
      - "8088:8088"   # HTTP - Gateway web interface
      - "8043:8043"   # HTTPS
      - "8060:8060"   # Gateway Network
      - "8022:8022"    # Java debug port
    volumes:
      # Named volume so Docker initializes data from the image on first run,
      # avoiding gateway.xml_clean errors with an empty bind mount.
      - ignition_data:/usr/local/bin/ignition/data
      # Drop .modl files here to install modules
      - ./ignition/modules:/usr/local/bin/ignition/data/modules
      # Git-tracked gateway config and projects
      - ./ignition/config:/usr/local/bin/ignition/data/config
      - ./ignition/projects:/usr/local/bin/ignition/data/projects
    environment:
      # Accept EULA automatically
      ACCEPT_IGNITION_EULA: "Y"

      # Gateway admin credentials (change these!)
      GATEWAY_ADMIN_USERNAME: "admin"
      GATEWAY_ADMIN_PASSWORD: "password"


      # Gateway network settings
      GATEWAY_NETWORK_0_HOST: "ignition-dev"

    command: -- -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8022
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Factry Historian
  historian:
    image: factry/historian:latest
    container_name: factry-historian
    ports:
      - "8000:8000"   # Web UI
      - "8001:8001"   # gRPC
    environment:
      HISTORIAN_POSTGRES_HOST: postgres
      HISTORIAN_POSTGRES_USER: factry
      HISTORIAN_POSTGRES_PASSWORD: password
      HISTORIAN_POSTGRES_DB: factry_historian
      HISTORIAN_INFLUXDB_URL: http://influx:8086
      AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      influx:
        condition: service_started
    restart: unless-stopped
    volumes:
      - historian_data:/data

  postgres:
    image: postgres:17-alpine
    container_name: factry-postgres
    environment:
      POSTGRES_USER: factry
      POSTGRES_PASSWORD: password
      POSTGRES_DB: factry_historian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factry -d factry_historian"]
      interval: 10s
      timeout: 5s
      retries: 5

  influx:
    image: influxdb:1.8
    container_name: factry-influx
    volumes:
      - influx_data:/var/lib/influxdb
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: factry-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  ignition_data:
  historian_data:
  postgres_data:
  influx_data:
  grafana_data:

networks:
  default:
    name: factry-historian-dev
