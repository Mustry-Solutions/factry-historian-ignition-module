services:
  ignition:
    image: inductiveautomation/ignition:8.3.1
    container_name: ignition-dev
    ports:
      - "8088:8088"   # HTTP - Gateway web interface
      - "8043:8043"   # HTTPS
      - "8060:8060"   # Gateway Network
      - "8000:8000"    # Java debug port
    volumes:
      # Mount data directory for persistence (modules, projects, gateway config, etc.)
      - ./ignition/data:/usr/local/bin/ignition/data

      # Optional: Mount module directly for hot deployment
      # NOTE: This does NOT work reliably for updates - always use manual UI upload
      # - ./build/Factry-Historian.modl:/usr/local/bin/ignition/user-lib/modules/Factry-Historian.modl
    environment:
      # Accept EULA automatically
      ACCEPT_IGNITION_EULA: "Y"
      
      # Gateway admin credentials (change these!)
      GATEWAY_ADMIN_USERNAME: "admin"
      GATEWAY_ADMIN_PASSWORD: "password"

      
      # Gateway network settings
      GATEWAY_NETWORK_0_HOST: "ignition-dev"

    command: -- -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Add the Go proxy for testing
  factry-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: factry-proxy
    ports:
      - "8111:8111"   # Proxy API
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8111/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: factry-historian-dev
